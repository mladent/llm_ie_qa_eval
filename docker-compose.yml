services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-ie-qa-eval:latest
    env_file:
      - .env
    command: ["python", "run_business_api.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    restart: unless-stopped

  eval:
    image: llm-ie-qa-eval:latest
    env_file:
      - .env
    command:
      [
        "python",
        "run_evaluation.py",
        "--config",
        "${EVAL_CONFIG:-demo/cv_recruiting_enterprise/project.yaml}",
      ]
    volumes:
      - ./outputs:/app/outputs
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    profiles: ["jobs"]

  business-eval:
    image: llm-ie-qa-eval:latest
    env_file:
      - .env
    command:
      [
        "python",
        "run_business_evaluation.py",
        "--experiment-dir",
        "${EXPERIMENT_DIR:-outputs/experiments/exp-your-id}",
        "--scenario",
        "${SCENARIO:-default}",
      ]
    volumes:
      - ./outputs:/app/outputs
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    profiles: ["jobs"]

  mlflow:
    image: llm-ie-qa-eval:latest
    command:
      [
        "mlflow",
        "ui",
        "--backend-store-uri",
        "sqlite:///mlflow.db",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
      ]
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    restart: unless-stopped
