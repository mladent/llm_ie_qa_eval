business_contract_version: "1.0.0"
compatibility_version: "1"
required_artifacts:
  - runs.jsonl
  - document_aggregates.csv
  - corpus_summary.json
required_outputs:
  - dashboard_summary.json
  - replay_metadata.json
  - scenario_business_summary.csv
  - item_business_breakdown.csv
required_dashboard_fields:
  - deployment_readiness
  - risk
  - stability
  - explainability
  - scenario
  - business_contract_version
  - business_config_version
  - business_config_hash
  - source_experiment_dir
  - scenario_summary
  - failure_breakdown
compatibility:
  backward_compatible_minor: true
  break_on_major_change: true
  strict_required_fields: true
