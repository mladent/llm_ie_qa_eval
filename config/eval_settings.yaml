experiment:
  name: "llm-json-eval"
  seed: 42
  output_dir: "outputs"
  num_runs: 5

data:
  dataset_path: "data/dataset.json"
  prompt_path: "prompts/extraction_prompt.txt"
  prompt_id: "extraction-v1"

model:
  provider: "openai" # openai | gemini
  model: "gpt-4o-mini"
  temperature: 0.2
  top_p: 1.0
  max_tokens: 2048

execution:
  max_retries: 3
  retry_backoff_seconds: 2
  timeout_seconds: 60
  continue_on_error: true

tracking:
  enable_mlflow: true
  tracking_uri: "sqlite:///mlflow.db"
  tags:
    project: "llm_ie_qa_eval"
    corpus: "default"

exports:
  write_jsonl: true
  write_csv: true
  write_parquet: true

hybrid:
  enabled: false
  schema_path: "config/extraction_output.schema.json"
  rubric_path: "config/hybrid_scoring.yaml"
  parse_error_behavior: "force_zero"
  path_syntax: "jsonpath"
  unknown_field_policy:
    mode: "penalize" # ignore | penalize | fail_schema
    penalty_weight: 0.1
  array_matching:
    fallback_strategy: "best_overlap" # best_overlap | strict_non_match | error
  schema_scoring:
    required_weight: 0.4
    type_weight: 0.3
    enum_weight: 0.2
    additional_properties_weight: 0.1
